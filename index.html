<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek AK1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #f0f9ff 0%, #bae6fd 50%, #7dd3fc 100%);
            overflow: hidden;
        }

        .popup-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 40px 50px 40px; /* Disesuaikan dikit atasnya biar ga terlalu mentok */
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
        }

        /* Style buat Logo Kemnaker */
        .logo-kemnaker {
            width: 90%;
            max-width: 250px; /* Biar ukurannya pas, gak kebesaran */
            height: auto;
            margin: 0 auto 20px auto;
            display: block;
        }

        h2 {
            color: #0c4a6e;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 35px;
            font-weight: 700;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
            background: #ffffff;
        }

        input[type="text"]:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        }

        .btn-check {
            background: #0c4a6e;
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
        }

        .btn-check:hover {
            background: #075985;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(12, 74, 110, 0.3);
        }

        /* MODAL CSS */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white; padding: 30px; border-radius: 20px;
            text-align: center; width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: scale(0.7); transition: all 0.3s ease;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-content h3 { margin-top: 0; font-size: 22px; }
        .modal-content p { font-size: 16px; line-height: 1.5; }

        .btn-close {
            background: white; color: #2563eb;
            border: none; padding: 12px 25px; border-radius: 10px;
            font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: background 0.3s;
        }
        .btn-close:hover { background: #f1f5f9; }

        /* Style buat teks copyright */
        .copyright {
            margin-top: 25px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>

        <h2>Cek Status Kartu Kuning (AK1)</h2>
        <input type="text" id="nomorAK1" placeholder="Masukkan Nomor Pendaftaran (AK1)" autocomplete="off">
        <button class="btn-check" onclick="bukaModal()">Periksa Status</button>

        <p class="copyright">Copyright &copy; 2026 Kementerian Ketenagakerjaan RI</p>
    </div>

    <div class="modal-overlay" id="modalNotif">
        <div class="modal-content" id="modalKotak">
            <h3 id="modalTitle">Informasi</h3>
            <p id="modalMsg">Tunggu sebentar...</p>
            <button class="btn-close" id="btnTutup" onclick="tutupModal()">Mengerti</button>
        </div>
    </div>

    <script>
        // MASUKIN URL WEB APP GAS LU DI SINI BOSS:
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyNnzodeDfZ1S5gVfZK5Rg_QeIBM-npPppILq8olaJ-dT6-G7Um6SOdhMjXZsWs-yL0LA/exec';

        const modal = document.getElementById('modalNotif');
        const modalTitle = document.getElementById('modalTitle');
        const modalMsg = document.getElementById('modalMsg');
        const modalKotak = document.getElementById('modalKotak');
        const btnTutup = document.getElementById('btnTutup');

        // --- TAMBAHAN BARU: EVENT LISTENER BIAR CUMA BISA HURUF & ANGKA + KAPITAL OTOMATIS ---
        const inputNomor = document.getElementById('nomorAK1');
        inputNomor.addEventListener('input', function() {
            // Regex ini bakal ngebuang semua karakter selain a-z, A-Z, dan 0-9
            // Terus .toUpperCase() bakal langsung ngubah ke huruf besar
            this.value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        });

        function bukaModal() {
            const val = document.getElementById('nomorAK1').value;

            if (val.trim() === "") {
                tampilkanNotif("Mohon Maaf", "Silakan masukkan nomor pendaftaran Anda terlebih dahulu.", "error");
                return;
            }

            // Tampilan Loading
            tampilkanNotif("Memproses...", "Sistem sedang mencari data Anda. Mohon menunggu...", "loading");

            // Mulai nyari ke Google Sheet
            fetch(`${scriptURL}?nomor=${val}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        // Kalo ketemu di sheet
                        let pesanSukses = `Halo Bapak/Ibu ${data.data.nama}.<br><br>Nomor Pendaftaran <b>${val}</b> ditemukan di sistem dengan status <b>${data.data.status}</b> sampai dengan tanggal <b>${data.data.expired}</b>`;
                        tampilkanNotif("Data Ditemukan", pesanSukses, "success");
                    } else {
                        // Kalo nomornya ga ada
                        tampilkanNotif("Data Tidak Ditemukan", "Mohon periksa kembali nomor pendaftaran yang Anda masukkan.", "error");
                    }
                })
                .catch(error => {
                    tampilkanNotif("Gangguan Sistem", "Gagal terhubung ke server. Silakan coba beberapa saat lagi.", "error");
                });
        }

        function tampilkanNotif(judul, pesan, tipe) {
            modalTitle.innerHTML = judul;
            modalMsg.innerHTML = pesan;

            if (tipe === "error") {
                modalKotak.style.background = "linear-gradient(135deg, #f59e0b 0%, #d97706 100%)";
                btnTutup.style.color = "#d97706";
                btnTutup.style.display = "inline-block";
            } else if (tipe === "loading") {
                modalKotak.style.background = "linear-gradient(135deg, #64748b 0%, #475569 100%)";
                btnTutup.style.display = "none"; // Sembunyiin tombol tutup pas loading
            } else {
                modalKotak.style.background = "linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%)";
                btnTutup.style.color = "#2563eb";
                btnTutup.style.display = "inline-block";
            }

            modal.classList.add('active');
        }

        function tutupModal() {
            modal.classList.remove('active');
        }
    </script>

</body>
</html>
